<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="container">
        <div class="header">
            <h1>🧾 Sticky Notes</h1>
            <p>Create, drag, and organize your thoughts!</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="addNote()">➕ New Note</button>
            <button class="btn btn-secondary" onclick="clearAllNotes()">🗑️ Clear All</button>
            <input type="color" class="color-picker" id="colorPicker" value="#f5f7fa" title="Pick Note Color">
            <span style="color: white; font-weight: 600;">Notes: <span id="noteCount">0</span></span>
        </div>

        <div class="board" id="board">
            <!-- Notes will be added here -->
        </div>
    </div>

    <div class="stats">
        Drag notes around • Double-click to edit • Right-click for color
    </div>
    
    <script src="app.js"></script>
</body>
</html>
